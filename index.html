<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Fi 商業級打卡系統 (不對稱密碼版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; display: block; }
        
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 160px;
            transform: translate(-50%, -50%);
            border: 2px dashed #00ff00;
            pointer-events: none;
        }
        
        .scan-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 140px;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 0, 0, 0.9);
            pointer-events: none;
            box-shadow: 0 0 5px red;
        }
        
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 11px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; font-weight:bold; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 220px; }
        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <h2>Li-Fi 密碼解碼智慧打卡</h2>
    <input type="text" id="studentId" placeholder="請先輸入學號 (例: 112001)" />
    <br><br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
        <div class="scan-line"></div>
    </div>
    <br>
    
    <button id="startBtn" onclick="startCamera()">開啟 Li-Fi 掃描</button>
    <div id="status">系統就緒，等待掃描...</div>
    <div id="debug">密碼鎖分析中...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        
        // 確保這是您的專屬 Google API
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";

        const COOLDOWN_MS = 60000; 
        let validFrameCount = 0; 
        let isWarmingUp = false; 
        let prevCenterVals = []; 

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", frameRate: { ideal: 30, max: 60 } } })
            .then(function(stream) {
                video.srcObject = stream;
                
                isWarmingUp = true;
                statusDiv.innerText = "⏳ 光學解碼安全自檢中...";
                statusDiv.style.color = "orange";
                
                setTimeout(() => {
                    isWarmingUp = false;
                    statusDiv.innerText = "請將紅線對準發射器 LED...";
                    statusDiv.style.color = "#007bff";
                }, 2000);

                setInterval(analyzeStripes, 50); 
            })
            .catch(function(err) {
                statusDiv.innerText = "無法啟動相機：" + err;
            });
        }

        function analyzeStripes() {
            if (isWarmingUp || isSending) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const centerY = canvas.height / 2;
                const startY = centerY - 70;
                const scanHeight = 140;
                
                const centerX = canvas.width / 2;
                const imgCenter = ctx.getImageData(centerX, startY, 1, scanHeight).data;
                
                let centerVals = [];
                for (let i = 0; i < scanHeight * 4; i += 4) {
                    centerVals.push((imgCenter[i] + imgCenter[i+1] + imgCenter[i+2]) / 3);
                }
                
                // 1. 計算時間維度動態閃爍量
                let centerTemporalDiff = 0;
                if (prevCenterVals.length === scanHeight) {
                    for (let i = 0; i < scanHeight; i++) {
                        centerTemporalDiff += Math.abs(centerVals[i] - prevCenterVals[i]);
                    }
                    centerTemporalDiff /= scanHeight;
                }
                prevCenterVals = [...centerVals];

                // 2. 擷取基礎物理特徵
                let maxB = Math.max(...centerVals);
                let minB = Math.min(...centerVals);
                let contrast = maxB - minB;
                
                // 3. 數位脈衝寬度解碼
                let midPoint = minB + (contrast / 2);
                let pulses = [];
                let currentPulseType = centerVals[0] > midPoint ? 1 : 0;
                let currentPulseWidth = 1;
                
                for (let i = 1; i < scanHeight; i++) {
                    let type = centerVals[i] > midPoint ? 1 : 0;
                    if (type === currentPulseType) {
                        currentPulseWidth++;
                    } else {
                        pulses.push({ type: currentPulseType, width: currentPulseWidth });
                        currentPulseType = type;
                        currentPulseWidth = 1;
                    }
                }
                pulses.push({ type: currentPulseType, width: currentPulseWidth });

                // 掐頭去尾避免邊緣不完整造成的誤差
                if (pulses.length >= 3) {
                    pulses = pulses.slice(1, -1);
                }

                // 分離亮帶 (1) 與暗帶 (0) 的寬度
                let darkWidths = [];
                let brightWidths = [];
                for (let p of pulses) {
                    if (p.type === 0) darkWidths.push(p.width);
                    if (p.type === 1) brightWidths.push(p.width);
                }

                // ==========================================
                // 【核心密碼鎖】：黑白非對稱比例審查
                // ==========================================
                let isSignatureMatched = false;
                let ratioReport = 0;
                let darkDiff = 99;
                let brightDiff = 99;

                if (darkWidths.length >= 2 && brightWidths.length >= 1) {
                    let avgDark = darkWidths.reduce((a, b) => a + b, 0) / darkWidths.length;
                    let avgBright = brightWidths.reduce((a, b) => a + b, 0) / brightWidths.length;
                    
                    // 計算黑白比例 (預期要是 3.0 倍)
                    ratioReport = avgDark / avgBright;
                    
                    // 檢查各自的等距規律性
                    darkDiff = Math.max(...darkWidths) - Math.min(...darkWidths);
                    brightDiff = Math.max(...brightWidths) - Math.min(...brightWidths);

                    // 終極防偽關卡：
                    // 1. 比例必須落在 2.3 ~ 3.7 之間（嚴格鎖死 3 倍特徵）
                    // 2. 黑條紋之間的誤差不得超過 4 像素
                    // 3. 白條紋之間的誤差不得超過 4 像素
                    if (ratioReport >= 2.3 && ratioReport <= 3.7 && darkDiff <= 4 && brightDiff <= 4) {
                        isSignatureMatched = true;
                    }
                }

                debugDiv.innerText = `最亮:${Math.round(maxB)} | 閃爍:${Math.round(centerTemporalDiff)} | 寬度比:${ratioReport.toFixed(1)}倍 | 密碼鎖:${isSignatureMatched}`;

                // ==========================================
                // 軍工級绝对鎖死條件
                // ==========================================
                let isSignalValid = false;

                // 條件一：最亮 > 240 (防低光源雜訊)
                // 條件二：對比度 > 150 (防柔和面光源)
                // 條件三：閃爍變異量 > 10 (防完全靜態物體)
                // 條件四：【絕殺】非對稱物理密碼鎖必須解鎖成功
                if (maxB > 240 && contrast > 150 && centerTemporalDiff > 10 && isSignatureMatched === true) {
                    isSignalValid = true;
                }

                if (isSignalValid) {
                    validFrameCount++;
                    // 連續 5 影格 (約 0.25 秒) 完美維持 3 倍比例才放行！手震晃動絕對不可能連續 5 次命中這個黃金比例！
                    if (validFrameCount < 5) {
                        statusDiv.innerText = `🔒 光學密碼解鎖中... (${validFrameCount}/5)`;
                        statusDiv.style.color = "orange";
                    } else {
                        sendData("A");
                        validFrameCount = 0; 
                    }
                } else {
                    validFrameCount = 0; 
                    if (statusDiv.innerText.includes("解鎖中")) {
                        statusDiv.innerText = "請用「紅色掃描線」對準發射器 LED...";
                        statusDiv.style.color = "#007bff";
                    }
                }
            }
        }

        let isSending = false;
        function sendData(roomCode) {
            const studentId = document.getElementById('studentId').value.trim();
            
            if(!studentId) {
                statusDiv.innerText = "❌ 驗證通過，但您忘記輸入學號！";
                statusDiv.style.color = "red";
                return;
            }

            const now = Date.now();
            const storageKey = 'lastCheckIn_' + studentId;
            const lastCheckIn = localStorage.getItem(storageKey);

            if (lastCheckIn) {
                const timePassed = now - parseInt(lastCheckIn);
                if (timePassed < COOLDOWN_MS) {
                    let remainSeconds = Math.ceil((COOLDOWN_MS - timePassed) / 1000);
                    statusDiv.innerText = `⏳ 學號 ${studentId} 請勿狂刷！請等待 ${remainSeconds} 秒。`;
                    statusDiv.style.color = "red";
                    return; 
                }
            }

            isSending = true;
            statusDiv.innerText = "🎉 密碼密鑰比對成功！打卡傳送中...";
            statusDiv.style.color = "#007bff";

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=${roomCode}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    localStorage.setItem(storageKey, Date.now());
                    statusDiv.innerText = "🎉 " + result + " (打卡成功)";
                    statusDiv.style.color = "green";
                    setTimeout(() => { 
                        isSending = false; 
                        statusDiv.innerText = "請用「紅色掃描線」對準發射器 LED...";
                        statusDiv.style.color = "#007bff";
                    }, 3000); 
                })
                .catch(error => {
                    statusDiv.innerText = "網路連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
