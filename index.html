    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            margin-bottom: 10px;
            aspect-ratio: 3/4; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform-origin: center center; transition: transform 0.1s ease-out; }
        .target-box {
            position: absolute; top: 50%; left: 50%; width: 100px; height: 100px;
            transform: translate(-50%, -50%); border: 3px dashed #00ff00;
            pointer-events: none; z-index: 10; box-shadow: 0 0 10px rgba(255,255,255,0.5); 
        }
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 11px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; font-weight:bold; }
        input[type="text"], input[type="number"] { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 250px; margin-bottom: 10px; box-sizing: border-box; }
        .zoom-control { margin: 10px 0 20px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        input[type="range"] { width: 180px; cursor: pointer; }
        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 250px; }
        button:hover { background-color: #27ae60; }
        .input-group { background: #fff; padding: 20px 15px 15px 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; margin-bottom: 15px; text-align: left; width: 250px; }
        .input-group label { font-size: 14px; font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
    </style>
</head>
