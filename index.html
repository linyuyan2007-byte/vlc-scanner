<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Fi 硬體變焦防震打卡</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            margin-bottom: 10px;
            aspect-ratio: 3/4; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }
        
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px; /* 擴大綠框，讓您更好對準 */
            height: 120px;
            transform: translate(-50%, -50%);
            border: 3px dashed #00ff00;
            pointer-events: none;
            z-index: 10;
        }
        
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 11px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; font-weight:bold; }
        
        input[type="text"], select { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 250px; margin-bottom: 10px; box-sizing: border-box; }
        
        .zoom-control { margin: 10px 0 20px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
        input[type="range"] { width: 180px; cursor: pointer; }
        .zoom-icon { font-size: 18px; }

        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 250px; }
        button:hover { background-color: #27ae60; }
        
        .input-group { background: #fff; padding: 20px 15px 15px 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; margin-bottom: 15px; text-align: left; width: 250px; }
        .input-group label { font-size: 14px; font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h2>Li-Fi 極速解碼打卡系統</h2>
    
    <div class="input-group">
        <label>🎓 學生學號：</label>
        <input type="text" id="studentId" placeholder="請輸入學號 (例: 112001)" />
        
        <label>📱 設備綁定：</label>
        <select id="phoneIdentity">
            <option value="1">我是：手機 1 (通道 1)</option>
            <option value="2">我是：手機 2 (通道 2)</option>
            <option value="3">我是：手機 3 (通道 3)</option>
            <option value="4">我是：手機 4 (通道 4)</option>
            <option value="5">我是：手機 5 (通道 5)</option>
            <option value="6">我是：手機 6 (通道 6)</option>
        </select>
    </div>
    <br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
    </div>
    
    <div class="zoom-control">
        <span class="zoom-icon">🔍</span>
        <input type="range" id="zoomSlider" min="1" max="5" step="0.1" value="1" oninput="updateZoom()">
        <span class="zoom-icon">➕</span>
    </div>
    
    <button id="startBtn" onclick="startCamera()">啟動極速防震掃描</button>
    <div id="status">系統就緒，等待開啟...</div>
    <div id="debug">硬體全域追瞄系統就緒...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";
        const COOLDOWN_MS = 60000; 
        const FIXED_ROOM_CODE = "205";

        let videoTrack = null;
        let nativeZoomSupported = false;

        // 時序狀態機變數
        let lastState = -1;
        let lastTransitionTime = performance.now();
        let currentSequence = [];
        let isReceivingPacket = false;
        let isWarmingUp = false;
        
        // 【新增】高光追瞄歷史陣列
        let temporalHistory = [];

        function updateZoom() {
            const zoomVal = parseFloat(document.getElementById('zoomSlider').value);
            if (nativeZoomSupported && videoTrack) {
                // 優先使用硬體底層真實變焦 (畫質不失真、不漂移)
                videoTrack.applyConstraints({ advanced: [{ zoom: zoomVal }] });
                video.style.transform = `scale(1)`; 
            } else {
                // 不支援的瀏覽器退回 CSS 變焦
                video.style.transform = `scale(${zoomVal})`;
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) { initCameraStream(stream); })
            .catch(function(err) {
                navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) { initCameraStream(stream); })
                .catch(function(err2) {
                    statusDiv.innerText = "❌ 無法開啟相機，請允許相機權限！";
                    statusDiv.style.color = "red";
                });
            });
        }

        function initCameraStream(stream) {
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
            
            // 偵測並綁定相機的硬體變焦能力
            const capabilities = videoTrack.getCapabilities();
            const slider = document.getElementById('zoomSlider');
            if (capabilities.zoom) {
                nativeZoomSupported = true;
                slider.min = capabilities.zoom.min;
                slider.max = capabilities.zoom.max;
                slider.step = capabilities.zoom.step;
                slider.value = capabilities.zoom.min;
            } else {
                nativeZoomSupported = false;
                slider.min = 1; slider.max = 5; slider.step = 0.1; slider.value = 1;
            }

            isWarmingUp = true;
            statusDiv.innerText = "⏳ 追瞄系統曝光校準中...";
            statusDiv.style.color = "orange";
            
            setTimeout(() => {
                isWarmingUp = false;
                statusDiv.innerText = "請滑動拉桿放大，將 LED 放入綠框內";
                statusDiv.style.color = "#007bff";
            }, 2000);

            setInterval(analyzeTemporalPulse, 12); 
        }

        function analyzeTemporalPulse() {
            if (isWarmingUp || isSending) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // 【核心升級一】將掃描區域擴大到 100x100，包容劇烈手震
                const captureSize = 100;
                canvas.width = captureSize;
                canvas.height = captureSize; 
                ctx.drawImage(video, video.videoWidth/2 - captureSize/2, video.videoHeight/2 - captureSize/2, captureSize, captureSize, 0, 0, captureSize, captureSize);
                
                const imageData = ctx.getImageData(0, 0, captureSize, captureSize).data;
                let frameMaxB = 0;

                // 【核心升級二】飛彈追瞄演算法：不管 LED 跑到哪裡，只找當下畫面最亮的那一顆像素！
                for (let i = 0; i < imageData.length; i += 4) {
                    let b = (imageData[i] + imageData[i+1] + imageData[i+2]) / 3;
                    if (b > frameMaxB) frameMaxB = b;
                }
                
                // 動態歷史高低光閥值 (防環境光干擾)
                temporalHistory.push(frameMaxB);
                if (temporalHistory.length > 20) temporalHistory.shift();

                let histMax = Math.max(...temporalHistory);
                let histMin = Math.min(...temporalHistory);
                let contrast = histMax - histMin;

                // 只要畫面閃爍對比足夠，就啟動解碼
                if (contrast > 40) { 
                    let midPoint = histMin + (contrast / 2);
                    // 只要最亮的那顆像素大於動態中間值，就代表 LED 是亮的！
                    let currentState = frameMaxB > midPoint ? 1 : 0;

                    if (lastState === -1) {
                        lastState = currentState;
                        lastTransitionTime = performance.now();
                        return;
                    }

                    if (currentState !== lastState) {
                        let now = performance.now();
                        let duration = now - lastTransitionTime; 
                        
                        decodePulse(lastState, duration);

                        lastState = currentState;
                        lastTransitionTime = now;
                    }
                }
            }
        }

        function decodePulse(state, duration) {
            const targetIdentity = document.getElementById('phoneIdentity').value;
            
            if (state === 1) {
                if (duration >= 170 && duration <= 300) {
                    isReceivingPacket = true;
                    currentSequence = []; 
                    debugDiv.innerText = "🎯 [鎖定] 追瞄解碼中...";
                    return;
                }

                if (isReceivingPacket) {
                    if (duration >= 10 && duration <= 65) {
                        currentSequence.push("S");
                    } 
                    else if (duration >= 70 && duration <= 125) {
                        currentSequence.push("L");
                    } 
                    else if (duration >= 130 && duration <= 165) {
                        processPacket(targetIdentity);
                    }
                    else {
                        isReceivingPacket = false;
                        debugDiv.innerText = `❌ 手震偏移過大 (${Math.round(duration)}ms)，重新鎖定`;
                    }
                }
            } else {
                if (duration > 500) {
                    isReceivingPacket = false;
                }
            }
        }

        function processPacket(targetIdentity) {
            isReceivingPacket = false; 
            let detectedCode = 0;
            
            let sig = currentSequence.join(","); 

            if (sig === "S,S,S") detectedCode = 1;
            if (sig === "S,S,L") detectedCode = 2;
            if (sig === "S,L,S") detectedCode = 3;
            if (sig === "L,S,S") detectedCode = 4;
            if (sig === "L,S,L") detectedCode = 5;
            if (sig === "L,L,S") detectedCode = 6;

            if (detectedCode > 0) {
                debugDiv.innerText = `✅ 解碼成功：密碼 ${detectedCode} (${sig})`;
                
                if (detectedCode == targetIdentity) {
                    sendData(detectedCode);
                } else {
                    statusDiv.innerText = `⏩ 略過手機 ${detectedCode}，尋找本機中...`;
                    statusDiv.style.color = "purple";
                }
            } else {
                debugDiv.innerText = `⚠️ 訊號破損 (${sig})，自動重試`;
            }
            
            currentSequence = []; 
        }

        let isSending = false;
        function sendData(matchedCode) {
            if (isSending) return;
            const rawStudentId = document.getElementById('studentId').value.trim();
            
            if(!rawStudentId) {
                statusDiv.innerText = `❌ 解碼成功！但您忘記輸入「學號」了。`;
                statusDiv.style.color = "red";
                return;
            }

            const combinedStudentId = `${rawStudentId}-手機${matchedCode}`;
            const now = Date.now();
            const storageKey = 'lastCheckIn_' + rawStudentId;
            const lastCheckIn = localStorage.getItem(storageKey);

            if (lastCheckIn) {
                const timePassed = now - parseInt(lastCheckIn);
                if (timePassed < COOLDOWN_MS) {
                    let remainSeconds = Math.ceil((COOLDOWN_MS - timePassed) / 1000);
                    statusDiv.innerText = `⏳ 防刷機制啟動！請等待 ${remainSeconds} 秒。`;
                    statusDiv.style.color = "red";
                    return; 
                }
            }

            isSending = true;
            statusDiv.innerText = `⚡ 驗證通過！資料極速傳送中...`;
            statusDiv.style.color = "green";

            const fetchUrl = `${API_URL}?student_id=${encodeURIComponent(combinedStudentId)}&room=${encodeURIComponent(FIXED_ROOM_CODE)}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    localStorage.setItem(storageKey, Date.now()); 
                    statusDiv.innerText = "🎉 " + result + " (打卡成功)";
                    setTimeout(() => { 
                        isSending = false; 
                        statusDiv.innerText = "請滑動拉桿放大，將 LED 放入綠框內";
                        statusDiv.style.color = "#007bff";
                    }, 3000); 
                })
                .catch(error => {
                    statusDiv.innerText = "網路連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
