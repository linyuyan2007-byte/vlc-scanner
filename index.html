<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Fi 商業級打卡系統 (動態防偽版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; display: block; }
        
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 160px;
            transform: translate(-50%, -50%);
            border: 2px solid #00ff00;
            pointer-events: none;
        }
        
        .scan-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 140px;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 0, 0, 0.7);
            pointer-events: none;
        }
        
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 11px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; font-weight:bold; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 220px; }
        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <h2>Li-Fi 光學智慧打卡</h2>
    <input type="text" id="studentId" placeholder="請先輸入學號 (例: 112001)" />
    <br><br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
        <div class="scan-line"></div>
    </div>
    <br>
    
    <button id="startBtn" onclick="startCamera()">開啟 Li-Fi 掃描</button>
    <div id="status">系統就緒，等待掃描...</div>
    <div id="debug">系統分析中...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        
        // 您的專屬 Google API
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";

        const COOLDOWN_MS = 60000; 
        let validFrameCount = 0; 
        let isWarmingUp = false; 
        
        // 【核心武器】：儲存上一格畫面的亮度，用來抓出靜態作弊者
        let prevBrightnessValues = []; 

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", frameRate: { ideal: 30, max: 60 } } })
            .then(function(stream) {
                video.srcObject = stream;
                
                isWarmingUp = true;
                statusDiv.innerText = "⏳ 相機暖機中，請稍候...";
                statusDiv.style.color = "orange";
                
                setTimeout(() => {
                    isWarmingUp = false;
                    statusDiv.innerText = "請用「紅色掃描線」對準發射器...";
                    statusDiv.style.color = "#007bff";
                }, 2000);

                setInterval(analyzeStripes, 50); 
            })
            .catch(function(err) {
                statusDiv.innerText = "無法啟動相機：" + err;
            });
        }

        function analyzeStripes() {
            if (isWarmingUp || isSending) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                const startY = centerY - 70;
                const scanHeight = 140;
                const imageData = ctx.getImageData(centerX, startY, 1, scanHeight);
                const data = imageData.data;
                
                let brightnessValues = [];
                for (let i = 0; i < data.length; i += 4) {
                    brightnessValues.push((data[i] + data[i+1] + data[i+2]) / 3);
                }
                
                let maxB = Math.max(...brightnessValues);
                let minB = Math.min(...brightnessValues);
                let contrast = maxB - minB;
                
                // 1. 計算空間總波動
                let totalVariation = 0;
                for (let i = 1; i < brightnessValues.length; i++) {
                    totalVariation += Math.abs(brightnessValues[i] - brightnessValues[i-1]);
                }

                // 2. 【核心防禦】：計算時間維度的「動態閃爍值 (Temporal Change)」
                let temporalChange = 0;
                if (prevBrightnessValues.length === brightnessValues.length) {
                    let totalDiff = 0;
                    for (let i = 0; i < brightnessValues.length; i++) {
                        totalDiff += Math.abs(brightnessValues[i] - prevBrightnessValues[i]);
                    }
                    temporalChange = totalDiff / brightnessValues.length;
                }
                // 將當前數據深拷貝給下一格使用
                prevBrightnessValues = [...brightnessValues];

                let averageBrightness = brightnessValues.reduce((a, b) => a + b, 0) / brightnessValues.length;
                let crossings = 0;
                let lastSign = (brightnessValues[0] >= averageBrightness) ? 1 : -1;
                let lastCrossingIndex = 0;
                let stripeWidths = [];
                
                for (let i = 1; i < brightnessValues.length; i++) {
                    let currentSign = (brightnessValues[i] >= averageBrightness) ? 1 : -1;
                    if (currentSign !== lastSign) {
                        crossings++;
                        stripeWidths.push(i - lastCrossingIndex);
                        lastCrossingIndex = i;
                        lastSign = currentSign;
                    }
                }

                let isRegular = false;
                if (stripeWidths.length >= 2) {
                    let validWidths = stripeWidths.length > 3 ? stripeWidths.slice(1, -1) : stripeWidths;
                    let minW = Math.min(...validWidths);
                    let maxW = Math.max(...validWidths);
                    if ((maxW - minW) <= 12) { 
                        isRegular = true;
                    }
                }

                // 除錯面板新增「動態」指標
                debugDiv.innerText = `最亮:${Math.round(maxB)} | 對比:${Math.round(contrast)} | 條紋:${crossings} | 動態:${temporalChange.toFixed(1)}`;

                // ==========================================
                // 無懈可擊的 5 道防護網 (時空雙重驗證)
                // ==========================================
                let isSignalValid = false;

                // 條件一：最亮 >= 245
                // 條件二：對比度 > 150
                // 條件三：總波動 > 800
                // 條件四：條紋數 >= 3
                // 條件五：【終極封殺】動態閃爍值必須 > 5.0！
                // 靜態的排針、螺絲、印刷字體，動態值通常只有 0.5~1.8，會在這裡被當場擊落！
                if (maxB >= 245 && contrast > 150 && totalVariation > 800 && crossings >= 3 && isRegular && temporalChange > 5.0) {
                    isSignalValid = true;
                }

                if (isSignalValid) {
                    validFrameCount++;
                    if (validFrameCount < 3) {
                        statusDiv.innerText = `🔍 動態加密特徵驗證中... (${validFrameCount}/3)`;
                        statusDiv.style.color = "orange";
                    } else {
                        sendData("A");
                        validFrameCount = 0; 
                    }
                } else {
                    validFrameCount = 0; 
                    if (statusDiv.innerText.includes("驗證中")) {
                        statusDiv.innerText = "請用「紅色掃描線」對準發射器...";
                        statusDiv.style.color = "#007bff";
                    }
                }
            }
        }

        let isSending = false;
        function sendData(roomCode) {
            const studentId = document.getElementById('studentId').value.trim();
            
            if(!studentId) {
                statusDiv.innerText = "❌ 驗證通過，但您忘記輸入學號！";
                statusDiv.style.color = "red";
                return;
            }

            const now = Date.now();
            const storageKey = 'lastCheckIn_' + studentId;
            const lastCheckIn = localStorage.getItem(storageKey);

            if (lastCheckIn) {
                const timePassed = now - parseInt(lastCheckIn);
                if (timePassed < COOLDOWN_MS) {
                    let remainSeconds = Math.ceil((COOLDOWN_MS - timePassed) / 1000);
                    statusDiv.innerText = `⏳ 學號 ${studentId} 請勿狂刷！請等待 ${remainSeconds} 秒。`;
                    statusDiv.style.color = "red";
                    return; 
                }
            }

            isSending = true;
            statusDiv.innerText = "🔒 特徵防偽驗證通過！傳送中...";
            statusDiv.style.color = "#007bff";

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=${roomCode}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    localStorage.setItem(storageKey, Date.now());
                    statusDiv.innerText = "🎉 " + result + " (打卡成功)";
                    statusDiv.style.color = "green";
                    setTimeout(() => { 
                        isSending = false; 
                        statusDiv.innerText = "請用「紅色掃描線」對準發射器...";
                        statusDiv.style.color = "#007bff";
                    }, 3000); 
                })
                .catch(error => {
                    statusDiv.innerText = "網路連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
