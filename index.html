<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Fi 商業級打卡系統 (雙探針防偽版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; display: block; }
        
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 160px;
            transform: translate(-50%, -50%);
            border: 2px solid #00ff00;
            pointer-events: none;
        }
        
        /* 升級為左右雙雷射探針 */
        .scan-line-left, .scan-line-right {
            position: absolute;
            top: 50%;
            width: 2px;
            height: 140px;
            background-color: rgba(255, 0, 0, 0.8);
            transform: translateY(-50%);
            pointer-events: none;
            box-shadow: 0 0 5px red;
        }
        .scan-line-left { left: calc(50% - 15px); }
        .scan-line-right { left: calc(50% + 15px); }
        
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 11px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; font-weight:bold; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 220px; }
        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <h2>Li-Fi 光學智慧打卡</h2>
    <input type="text" id="studentId" placeholder="請先輸入學號 (例: 112001)" />
    <br><br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
        <div class="scan-line-left"></div>
        <div class="scan-line-right"></div>
    </div>
    <br>
    
    <button id="startBtn" onclick="startCamera()">開啟 Li-Fi 掃描</button>
    <div id="status">系統就緒，等待掃描...</div>
    <div id="debug">雙探針立體分析中...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        
        // 確保您的 Google API 網址正確
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";

        const COOLDOWN_MS = 60000; 
        let validFrameCount = 0; 
        let isWarmingUp = false; 

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", frameRate: { ideal: 30, max: 60 } } })
            .then(function(stream) {
                video.srcObject = stream;
                
                isWarmingUp = true;
                statusDiv.innerText = "⏳ 相機暖機中，請稍候...";
                statusDiv.style.color = "orange";
                
                setTimeout(() => {
                    isWarmingUp = false;
                    statusDiv.innerText = "請將發射器置於「雙紅色探針」之間...";
                    statusDiv.style.color = "#007bff";
                }, 2000);

                setInterval(analyzeStripes, 50); 
            })
            .catch(function(err) {
                statusDiv.innerText = "無法啟動相機：" + err;
            });
        }

        function analyzeStripes() {
            if (isWarmingUp || isSending) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const startY = centerY - 70;
                const scanHeight = 140;
                
                // 擷取左邊探針 (X - 15) 的影像數據
                const imgLeft = ctx.getImageData(centerX - 15, startY, 1, scanHeight).data;
                // 擷取右邊探針 (X + 15) 的影像數據
                const imgRight = ctx.getImageData(centerX + 15, startY, 1, scanHeight).data;
                
                let bLeft = [], bRight = [];
                let spatialDiff = 0; // 左右兩側的差異度
                let totalVariation = 0;
                let maxB = 0;
                let minB = 255;
                
                for (let i = 0; i < scanHeight; i++) {
                    let idx = i * 4;
                    let l = (imgLeft[idx] + imgLeft[idx+1] + imgLeft[idx+2]) / 3;
                    let r = (imgRight[idx] + imgRight[idx+1] + imgRight[idx+2]) / 3;
                    
                    bLeft.push(l);
                    bRight.push(r);
                    
                    // 核心1：計算左右兩條線在同一個水平位置的亮度差異
                    spatialDiff += Math.abs(l - r);
                    
                    if (l > maxB) maxB = l;
                    if (l < minB) minB = l;
                    if (i > 0) totalVariation += Math.abs(bLeft[i] - bLeft[i-1]);
                }
                
                let avgSpatialDiff = spatialDiff / scanHeight;
                let averageBrightness = bLeft.reduce((a, b) => a + b, 0) / scanHeight;
                
                // 計算條紋數 (以左側為準)
                let crossings = 0;
                let lastSign = (bLeft[0] >= averageBrightness) ? 1 : -1;
                for (let i = 1; i < scanHeight; i++) {
                    let currentSign = (bLeft[i] >= averageBrightness) ? 1 : -1;
                    if (currentSign !== lastSign) {
                        crossings++;
                        lastSign = currentSign;
                    }
                }

                // 將破案關鍵數據印出來
                debugDiv.innerText = `最亮:${Math.round(maxB)} | 最暗:${Math.round(minB)} | 條紋:${crossings} | 左右差異:${Math.round(avgSpatialDiff)}`;

                // ==========================================
                // 物理實體 100% 絕對封殺邏輯
                // ==========================================
                let isSignalValid = false;

                // 條件一：最亮 > 220 (必須有強光)
                // 條件二：【新增】最暗 < 70 (發射器暗頻時是絕對黑體，沒通電的板子最暗通常大於 80)
                // 條件三：波動 > 800 (維持高頻特徵)
                // 條件四：條紋 >= 4 (具備一定的閃爍數量)
                // 條件五：【終極絕殺】左右差異度 (avgSpatialDiff) 必須 < 25！
                // 真光的條紋是橫向連續的，左右差異度極低 (通常 5~15)。物理實體左右長得不一樣，差異度隨便都破 30！
                
                if (maxB > 220 && minB < 70 && totalVariation > 800 && crossings >= 4 && avgSpatialDiff < 25) {
                    isSignalValid = true;
                }

                if (isSignalValid) {
                    validFrameCount++;
                    if (validFrameCount < 3) {
                        statusDiv.innerText = `🔍 立體特徵鎖定中... (${validFrameCount}/3)`;
                        statusDiv.style.color = "orange";
                    } else {
                        sendData("A");
                        validFrameCount = 0; 
                    }
                } else {
                    validFrameCount = 0; 
                    if (statusDiv.innerText.includes("鎖定中")) {
                        statusDiv.innerText = "請將發射器置於「雙紅色探針」之間...";
                        statusDiv.style.color = "#007bff";
                    }
                }
            }
        }

        let isSending = false;
        function sendData(roomCode) {
            const studentId = document.getElementById('studentId').value.trim();
            
            if(!studentId) {
                statusDiv.innerText = "❌ 驗證通過，但您忘記輸入學號！";
                statusDiv.style.color = "red";
                return;
            }

            const now = Date.now();
            const storageKey = 'lastCheckIn_' + studentId;
            const lastCheckIn = localStorage.getItem(storageKey);

            if (lastCheckIn) {
                const timePassed = now - parseInt(lastCheckIn);
                if (timePassed < COOLDOWN_MS) {
                    let remainSeconds = Math.ceil((COOLDOWN_MS - timePassed) / 1000);
                    statusDiv.innerText = `⏳ 學號 ${studentId} 請勿狂刷！請等待 ${remainSeconds} 秒。`;
                    statusDiv.style.color = "red";
                    return; 
                }
            }

            isSending = true;
            statusDiv.innerText = "🔒 雙探針立體驗證通過！傳送中...";
            statusDiv.style.color = "#007bff";

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=${roomCode}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    localStorage.setItem(storageKey, Date.now());
                    statusDiv.innerText = "🎉 " + result + " (打卡成功)";
                    statusDiv.style.color = "green";
                    setTimeout(() => { 
                        isSending = false; 
                        statusDiv.innerText = "請將發射器置於「雙紅色探針」之間...";
                        statusDiv.style.color = "#007bff";
                    }, 3000); 
                })
                .catch(error => {
                    statusDiv.innerText = "網路連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
