<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光學智慧防偽打卡系統</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f6f9; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; display: block; }
        .target-box {
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 100%;
            transform: translateX(-50%);
            background: rgba(0, 255, 0, 0.3);
            border-left: 1px dashed #0f0;
            border-right: 1px dashed #0f0;
            pointer-events: none;
        }
        #status { font-weight: bold; color: #333; margin-top: 15px; font-size: 18px; }
        #debug { color: #666; font-size: 14px; margin-top: 10px; font-family: monospace; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 200px; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .progress-bar { width: 100%; max-width: 300px; height: 10px; background: #ddd; margin: 10px auto; border-radius: 5px; overflow: hidden; }
        #progress { width: 0%; height: 100%; background: #28a745; transition: width 0.1s; }
    </style>
</head>
<body>
    <h2>光學防偽閘門接收器</h2>
    <input type="text" id="studentId" placeholder="請先輸入學號" />
    <br>
   
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
    </div>
   
    <div class="progress-bar"><div id="progress"></div></div>
   
    <button id="startBtn" onclick="startCamera()">開啟鏡頭掃描</button>
    <div id="status">系統就緒，等待掃描...</div>
    <div id="debug">亮度: 0 | 條紋: 0</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        const progressDiv = document.getElementById('progress');
       
        // 請將下方替換為你的 Google Apps Script 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";

        let consecutiveHits = 0; // 連續成功鎖定的影格數
        const REQUIRED_HITS = 5; // 需要連續 5 張畫面都正確才算打卡成功
        let isSending = false;

        function startCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
            })
            .then(function(stream) {
                video.srcObject = stream;
                statusDiv.innerText = "請將垂直綠線對準發射器光源...";
                statusDiv.style.color = "#007bff";
               
                // 嘗試開啟放大(Zoom)功能來拉長打卡距離
                const track = stream.getVideoTracks()[0];
                if (track.getCapabilities && track.getCapabilities().zoom) {
                    track.applyConstraints({ advanced: [{ zoom: 2.0 }] }).catch(e => {});
                }

                setInterval(analyzeLight, 33); // 每 33ms 分析一次 (~30fps)
            })
            .catch(function(err) {
                statusDiv.innerText = "無法取用相機：" + err;
            });
        }

        function analyzeLight() {
            if (video.readyState === video.HAVE_ENOUGH_DATA && !isSending) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
               
                const centerX = Math.floor(canvas.width / 2);
                // 擷取畫面正中央的一整條垂直線
                const imageData = ctx.getImageData(centerX, 0, 1, canvas.height);
                const data = imageData.data;
               
                let totalBrightness = 0;
                let brightnessArray = new Uint8Array(canvas.height);

                // 1. 計算所有像素亮度並求平均
                for (let y = 0; y < canvas.height; y++) {
                    let i = y * 4;
                    let b = (data[i] + data[i+1] + data[i+2]) / 3;
                    brightnessArray[y] = b;
                    totalBrightness += b;
                }
               
                let avgBrightness = totalBrightness / canvas.height;

                // 【第一道防線】：如果整體亮度太暗，代表根本沒對準光源，直接歸零
                if (avgBrightness < 150) {
                    resetLock();
                    debugDiv.innerText = `亮度不足 (${Math.round(avgBrightness)})`;
                    return;
                }

                // 2. 算條紋 (使用動態平均值當作切換門檻)
                let stripeCount = 0;
                let isBright = false;
               
                for (let y = 0; y < canvas.height; y++) {
                    // 加上 10 的容差值，避免微小雜訊干擾
                    if (brightnessArray[y] > avgBrightness + 10) {
                        if (!isBright) {
                            stripeCount++;
                            isBright = true;
                        }
                    } else if (brightnessArray[y] < avgBrightness - 10) {
                        isBright = false;
                    }
                }

                debugDiv.innerText = `亮度: ${Math.round(avgBrightness)} | 條紋數: ${stripeCount}`;

                // 【第二道防線】：檢查條紋數量是否符合我們 LED 發射的頻率特徵
                // 根據 1000Hz 與相機快門，通常會產生 6 ~ 20 條之間的條紋
                if (stripeCount >= 6 && stripeCount <= 20) {
                    consecutiveHits++;
                    progressDiv.style.width = (consecutiveHits / REQUIRED_HITS * 100) + "%";
                   
                    // 【第三道防線】：連續穩定鎖定
                    if (consecutiveHits >= REQUIRED_HITS) {
                        statusDiv.innerText = "特徵鎖定成功！發送打卡數據...";
                        statusDiv.style.color = "orange";
                        sendData("A");
                        resetLock();
                    }
                } else {
                    // 如果中途手晃掉，條紋數量不對，馬上歸零重新計算！
                    resetLock();
                }
            }
        }

        function resetLock() {
            consecutiveHits = 0;
            progressDiv.style.width = "0%";
        }

        function sendData(roomCode) {
            isSending = true;
            const studentId = document.getElementById('studentId').value;
           
            if(!studentId) {
                statusDiv.innerText = " 掃描成功，但您忘記輸入學號！";
                statusDiv.style.color = "red";
                setTimeout(() => { isSending = false; statusDiv.innerText="請輸入學號後再次對準光源"; }, 2000);
                return;
            }

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=${roomCode}`;
           
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    statusDiv.innerText = " " + result + " (已成功記入雲端庫)";
                    statusDiv.style.color = "green";
                    setTimeout(() => {
                        isSending = false;
                        statusDiv.innerText = "請將垂直綠線對準發射器光源...";
                        statusDiv.style.color = "#007bff";
                    }, 3000); // 3秒後解鎖，允許下一次打卡
                })
                .catch(error => {
                    statusDiv.innerText = "連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
