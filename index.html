<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Fi 商業級打卡系統 (防震雷達版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; display: block; }
        
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 160px;
            transform: translate(-50%, -50%);
            border: 2px dashed #00ff00;
            pointer-events: none;
        }
        
        /* 中央紅線：負責接收高頻 Li-Fi 訊號 */
        .scan-line-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 140px;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 0, 0, 0.9);
            pointer-events: none;
            box-shadow: 0 0 5px red;
        }

        /* 邊緣藍線：負責偵測環境是否有人為晃動 */
        .scan-line-bg {
            position: absolute;
            top: 50%;
            left: 10%;
            width: 2px;
            height: 140px;
            transform: translateY(-50%);
            background-color: rgba(0, 150, 255, 0.7);
            pointer-events: none;
            box-shadow: 0 0 5px blue;
        }
        
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 11px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; font-weight:bold; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 220px; }
        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <h2>Li-Fi 防手震智慧打卡</h2>
    <input type="text" id="studentId" placeholder="請先輸入學號 (例: 112001)" />
    <br><br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
        <div class="scan-line-center"></div>
        <div class="scan-line-bg"></div>
    </div>
    <br>
    
    <button id="startBtn" onclick="startCamera()">開啟 Li-Fi 掃描</button>
    <div id="status">系統就緒，等待掃描...</div>
    <div id="debug">雙雷達追蹤分析中...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        
        // 確保這是您的專屬 Google API
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";

        const COOLDOWN_MS = 60000; 
        let validFrameCount = 0; 
        let isWarmingUp = false; 
        
        // 雙軌記憶體：紀錄上一幀的狀態
        let prevCenterVals = []; 
        let prevBgVals = [];

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", frameRate: { ideal: 30, max: 60 } } })
            .then(function(stream) {
                video.srcObject = stream;
                
                isWarmingUp = true;
                statusDiv.innerText = "⏳ 雙雷達校準中...";
                statusDiv.style.color = "orange";
                
                setTimeout(() => {
                    isWarmingUp = false;
                    statusDiv.innerText = "請將紅線對準發射器，並保持手機穩定";
                    statusDiv.style.color = "#007bff";
                }, 2000);

                setInterval(analyzeStripes, 50); 
            })
            .catch(function(err) {
                statusDiv.innerText = "無法啟動相機：" + err;
            });
        }

        function analyzeStripes() {
            if (isWarmingUp || isSending) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const centerY = canvas.height / 2;
                const startY = centerY - 70;
                const scanHeight = 140;
                
                // 中央探針 (紅線)：擷取目標訊號
                const centerX = canvas.width / 2;
                const imgCenter = ctx.getImageData(centerX, startY, 1, scanHeight).data;
                
                // 背景探針 (藍線)：擷取左側環境作為防震參考
                const bgX = canvas.width * 0.1; 
                const imgBg = ctx.getImageData(bgX, startY, 1, scanHeight).data;
                
                let centerVals = [], bgVals = [];
                for (let i = 0; i < scanHeight * 4; i += 4) {
                    centerVals.push((imgCenter[i] + imgCenter[i+1] + imgCenter[i+2]) / 3);
                    bgVals.push((imgBg[i] + imgBg[i+1] + imgBg[i+2]) / 3);
                }
                
                // 1. 計算時間維度的「動態變化量」
                let centerTemporalDiff = 0; // 中央目標的閃爍程度
                let bgTemporalDiff = 0;     // 背景環境的晃動程度
                
                if (prevCenterVals.length === scanHeight) {
                    for (let i = 0; i < scanHeight; i++) {
                        centerTemporalDiff += Math.abs(centerVals[i] - prevCenterVals[i]);
                        bgTemporalDiff += Math.abs(bgVals[i] - prevBgVals[i]);
                    }
                    centerTemporalDiff /= scanHeight; // 求平均單一像素的變化量
                    bgTemporalDiff /= scanHeight;
                }
                
                prevCenterVals = [...centerVals];
                prevBgVals = [...bgVals];

                // 2. 擷取中央目標的物理光學特徵
                let maxB = Math.max(...centerVals);
                let minB = Math.min(...centerVals);
                let contrast = maxB - minB;
                
                let avgCenter = centerVals.reduce((a, b) => a + b, 0) / scanHeight;
                let crossings = 0;
                let lastSign = (centerVals[0] >= avgCenter) ? 1 : -1;
                
                for (let i = 1; i < scanHeight; i++) {
                    let currentSign = (centerVals[i] >= avgCenter) ? 1 : -1;
                    if (currentSign !== lastSign) {
                        crossings++;
                        lastSign = currentSign;
                    }
                }

                debugDiv.innerText = `晃動:${Math.round(bgTemporalDiff)} | 閃爍:${Math.round(centerTemporalDiff)} | 亮度:${Math.round(maxB)} | 對比:${Math.round(contrast)}`;

                // ==========================================
                // 軍工級防手震判定邏輯
                // ==========================================
                let isStable = bgTemporalDiff < 18; // 【防震鎖】：背景變化量超過 18，代表正在劇烈搖晃手機
                let isFlashing = centerTemporalDiff > 25; // 目標必須具備高度閃爍特徵
                let isSignalValid = false;

                if (!isStable) {
                    // 如果藍色探針發現畫面在晃動，立刻歸零並警告
                    validFrameCount = 0;
                    if (!statusDiv.innerText.includes("晃動")) {
                        statusDiv.innerText = "⚠️ 偵測到劇烈晃動，請保持手機穩定！";
                        statusDiv.style.color = "red";
                    }
                    return; // 提早結束，不進行後續判斷
                }

                // 如果環境穩定 (沒搖手機)，再來檢查紅線對準的是不是發射器
                // 條件一：紅線區域強烈閃爍
                // 條件二：亮度過載 (> 230)
                // 條件三：具備黑白斑馬線的對比度 (> 100)
                // 條件四：至少有 2 條以上的斑馬線
                if (isFlashing && maxB > 230 && contrast > 100 && crossings >= 2) {
                    isSignalValid = true;
                }

                if (isSignalValid) {
                    validFrameCount++;
                    if (validFrameCount < 3) {
                        statusDiv.innerText = `🔍 目標穩定，防偽鎖定中... (${validFrameCount}/3)`;
                        statusDiv.style.color = "orange";
                    } else {
                        sendData("A");
                        validFrameCount = 0; 
                    }
                } else {
                    validFrameCount = 0; 
                    if (statusDiv.innerText.includes("鎖定中") || statusDiv.innerText.includes("穩定")) {
                        statusDiv.innerText = "請將紅線對準發射器，並保持手機穩定";
                        statusDiv.style.color = "#007bff";
                    }
                }
            }
        }

        let isSending = false;
        function sendData(roomCode) {
            const studentId = document.getElementById('studentId').value.trim();
            
            if(!studentId) {
                statusDiv.innerText = "❌ 驗證通過，但您忘記輸入學號！";
                statusDiv.style.color = "red";
                return;
            }

            const now = Date.now();
            const storageKey = 'lastCheckIn_' + studentId;
            const lastCheckIn = localStorage.getItem(storageKey);

            if (lastCheckIn) {
                const timePassed = now - parseInt(lastCheckIn);
                if (timePassed < COOLDOWN_MS) {
                    let remainSeconds = Math.ceil((COOLDOWN_MS - timePassed) / 1000);
                    statusDiv.innerText = `⏳ 學號 ${studentId} 請勿狂刷！請等待 ${remainSeconds} 秒。`;
                    statusDiv.style.color = "red";
                    return; 
                }
            }

            isSending = true;
            statusDiv.innerText = "🔒 雙雷達安全驗證通過！傳送中...";
            statusDiv.style.color = "#007bff";

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=${roomCode}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    localStorage.setItem(storageKey, Date.now());
                    statusDiv.innerText = "🎉 " + result + " (打卡成功)";
                    statusDiv.style.color = "green";
                    setTimeout(() => { 
                        isSending = false; 
                        statusDiv.innerText = "請將紅線對準發射器，並保持手機穩定";
                        statusDiv.style.color = "#007bff";
                    }, 3000); 
                })
                .catch(error => {
                    statusDiv.innerText = "網路連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
