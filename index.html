<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Fi 商業級打卡系統 (絕對鎖死版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; display: block; }
        
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 160px;
            transform: translate(-50%, -50%);
            border: 2px dashed #00ff00;
            pointer-events: none;
        }
        
        .scan-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 140px;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 0, 0, 0.9);
            pointer-events: none;
            box-shadow: 0 0 4px red;
        }
        
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 11px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; font-weight:bold; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 220px; }
        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <h2>Li-Fi 示波器級智慧打卡</h2>
    <input type="text" id="studentId" placeholder="請先輸入學號 (例: 112001)" />
    <br><br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
        <div class="scan-line"></div>
    </div>
    <br>
    
    <button id="startBtn" onclick="startCamera()">開啟 Li-Fi 掃描</button>
    <div id="status">系統就緒，等待掃描...</div>
    <div id="debug">波形解碼器分析中...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        
        // 確保這是您的專屬 Google API
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";

        const COOLDOWN_MS = 60000; 
        let validFrameCount = 0; 
        let isWarmingUp = false; 

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", frameRate: { ideal: 30, max: 60 } } })
            .then(function(stream) {
                video.srcObject = stream;
                
                isWarmingUp = true;
                statusDiv.innerText = "⏳ 相機暖機與測光中...";
                statusDiv.style.color = "orange";
                
                setTimeout(() => {
                    isWarmingUp = false;
                    statusDiv.innerText = "請用「紅色掃描線」對準發射器...";
                    statusDiv.style.color = "#007bff";
                }, 2000);

                setInterval(analyzeStripes, 50); 
            })
            .catch(function(err) {
                statusDiv.innerText = "無法啟動相機：" + err;
            });
        }

        function analyzeStripes() {
            if (isWarmingUp || isSending) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const startY = centerY - 70;
                const scanHeight = 140;
                const imageData = ctx.getImageData(centerX, startY, 1, scanHeight);
                const data = imageData.data;
                
                let brightnessValues = [];
                for (let i = 0; i < data.length; i += 4) {
                    brightnessValues.push((data[i] + data[i+1] + data[i+2]) / 3);
                }
                
                let maxB = Math.max(...brightnessValues);
                let minB = Math.min(...brightnessValues);
                let contrast = maxB - minB;
                
                // 【核心一：銳利度檢測】找出像素之間的最大落差 (Gradient)
                // 發射器是瞬間閃爍，邊緣極度銳利；手震模糊的邊緣是平滑的
                let maxGradient = 0;
                for (let i = 1; i < brightnessValues.length; i++) {
                    let grad = Math.abs(brightnessValues[i] - brightnessValues[i-1]);
                    if (grad > maxGradient) maxGradient = grad;
                }

                // 【核心二：數位方波解碼】將灰階轉為純粹的 0 與 1 (高低電位)
                let midPoint = minB + (contrast / 2); // 找中位數作為閥值
                let pulses = [];
                let currentPulseType = brightnessValues[0] > midPoint ? 1 : 0;
                let currentPulseWidth = 1;

                // 測量每一個「亮帶」與「暗帶」的寬度
                for (let i = 1; i < brightnessValues.length; i++) {
                    let type = brightnessValues[i] > midPoint ? 1 : 0;
                    if (type === currentPulseType) {
                        currentPulseWidth++;
                    } else {
                        pulses.push({ type: currentPulseType, width: currentPulseWidth });
                        currentPulseType = type;
                        currentPulseWidth = 1;
                    }
                }
                pulses.push({ type: currentPulseType, width: currentPulseWidth });

                // 移除頭尾被截斷的不完整波形
                if (pulses.length >= 3) {
                    pulses = pulses.slice(1, -1);
                }

                // 【核心三：方波佔空比與均勻度審查】
                let isPerfectWaveform = false;
                let dutyCycleRatio = 0;
                
                if (pulses.length >= 4) { // 至少要有完整的 4 個亮暗變化
                    let maxW = 0, minW = 999;
                    let brightSum = 0, brightCount = 0;
                    let darkSum = 0, darkCount = 0;

                    for (let p of pulses) {
                        if (p.width > maxW) maxW = p.width;
                        if (p.width < minW) minW = p.width;
                        if (p.type === 1) { brightSum += p.width; brightCount++; }
                        else { darkSum += p.width; darkCount++; }
                    }

                    // 1. 計算所有條紋的最粗與最細差異
                    let widthDiff = maxW - minW;
                    
                    // 2. 計算 50/50 佔空比 (亮帶平均寬度 vs 暗帶平均寬度)
                    let avgBright = brightCount > 0 ? (brightSum / brightCount) : 0;
                    let avgDark = darkCount > 0 ? (darkSum / darkCount) : 0;
                    
                    if (avgDark > 0) {
                        dutyCycleRatio = avgBright / avgDark;
                    }

                    // 【絕殺判定】：寬度誤差 <= 8 且 亮暗比例對稱 (0.5 到 2.0 之間)
                    // 手晃產生的殘影寬度誤差絕對破 20，且佔空比極度扭曲
                    if (widthDiff <= 8 && dutyCycleRatio > 0.5 && dutyCycleRatio < 2.0) {
                        isPerfectWaveform = true;
                    }
                }

                // 將軍事級的數據印出來讓您觀察
                debugDiv.innerText = `最亮:${Math.round(maxB)} | 銳利度:${Math.round(maxGradient)} | 條紋:${pulses.length} | 完美方波:${isPerfectWaveform}`;

                // ==========================================
                // 無堅不摧的四重物理鎖
                // ==========================================
                let isSignalValid = false;

                // 1. 物理亮度過載 (maxB > 240) -> 阻擋室內暗部環境
                // 2. 頻閃銳利邊緣 (maxGradient > 80) -> 阻擋任何手搖產生的殘影模糊
                // 3. 完美數位方波 (isPerfectWaveform === true) -> 阻擋任何隨機線條或不對稱的幾何圖形
                if (maxB > 240 && maxGradient > 80 && isPerfectWaveform === true) {
                    isSignalValid = true;
                }

                if (isSignalValid) {
                    validFrameCount++;
                    if (validFrameCount < 3) {
                        statusDiv.innerText = `🔍 數位方波解碼中... (${validFrameCount}/3)`;
                        statusDiv.style.color = "orange";
                    } else {
                        sendData("A");
                        validFrameCount = 0; 
                    }
                } else {
                    validFrameCount = 0; 
                    if (statusDiv.innerText.includes("解碼中")) {
                        statusDiv.innerText = "請用「紅色掃描線」對準發射器...";
                        statusDiv.style.color = "#007bff";
                    }
                }
            }
        }

        let isSending = false;
        function sendData(roomCode) {
            const studentId = document.getElementById('studentId').value.trim();
            
            if(!studentId) {
                statusDiv.innerText = "❌ 驗證通過，但您忘記輸入學號！";
                statusDiv.style.color = "red";
                return;
            }

            const now = Date.now();
            const storageKey = 'lastCheckIn_' + studentId;
            const lastCheckIn = localStorage.getItem(storageKey);

            if (lastCheckIn) {
                const timePassed = now - parseInt(lastCheckIn);
                if (timePassed < COOLDOWN_MS) {
                    let remainSeconds = Math.ceil((COOLDOWN_MS - timePassed) / 1000);
                    statusDiv.innerText = `⏳ 學號 ${studentId} 請勿狂刷！請等待 ${remainSeconds} 秒。`;
                    statusDiv.style.color = "red";
                    return; 
                }
            }

            isSending = true;
            statusDiv.innerText = "🔒 示波器級特徵鎖定！傳送中...";
            statusDiv.style.color = "#007bff";

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=${roomCode}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    localStorage.setItem(storageKey, Date.now());
                    statusDiv.innerText = "🎉 " + result + " (打卡成功)";
                    statusDiv.style.color = "green";
                    setTimeout(() => { 
                        isSending = false; 
                        statusDiv.innerText = "請用「紅色掃描線」對準發射器...";
                        statusDiv.style.color = "#007bff";
                    }, 3000); 
                })
                .catch(error => {
                    statusDiv.innerText = "網路連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
