<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Fi 商業級打卡系統 (防刷升級版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; display: block; }
        
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 160px;
            transform: translate(-50%, -50%);
            border: 2px solid #00ff00;
            pointer-events: none;
        }
        
        .scan-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 140px;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 0, 0, 0.7);
            pointer-events: none;
        }
        
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 12px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 220px; }
        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <h2>Li-Fi 光學智慧打卡</h2>
    <input type="text" id="studentId" placeholder="請先輸入學號 (例: 112001)" />
    <br><br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
        <div class="scan-line"></div>
    </div>
    <br>
    
    <button id="startBtn" onclick="startCamera()">開啟 Li-Fi 掃描</button>
    <div id="status">系統就緒，等待掃描...</div>
    <div id="debug">條紋特徵與環境分析中...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        
        // 您的專屬 Google API
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";

        // 冷卻時間設定：1 分鐘
        const COOLDOWN_MS = 60000; 

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", frameRate: { ideal: 30, max: 60 } } })
            .then(function(stream) {
                video.srcObject = stream;
                statusDiv.innerText = "請用「紅色掃描線」對準發射器...";
                statusDiv.style.color = "#007bff";
                setInterval(analyzeStripes, 50); 
            })
            .catch(function(err) {
                statusDiv.innerText = "無法啟動相機：" + err;
            });
        }

        function analyzeStripes() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                const startY = centerY - 70;
                const scanHeight = 140;
                const imageData = ctx.getImageData(centerX, startY, 1, scanHeight);
                const data = imageData.data;
                
                let brightnessValues = [];
                let totalBrightness = 0;
                
                for (let i = 0; i < data.length; i += 4) {
                    let brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                    brightnessValues.push(brightness);
                    totalBrightness += brightness;
                }
                
                let averageBrightness = totalBrightness / brightnessValues.length;
                
                // 找出這條線上的最亮與最暗，計算對比度
                let maxB = brightnessValues[0]; 
                let minB = brightnessValues[0];
                for(let b of brightnessValues) {
                    if(b > maxB) maxB = b;
                    if(b < minB) minB = b;
                }
                let contrast = maxB - minB;

                let crossings = 0;
                let lastSign = (brightnessValues[0] >= averageBrightness) ? 1 : -1;
                let lastCrossingIndex = 0;
                let stripeWidths = [];
                
                for (let i = 1; i < brightnessValues.length; i++) {
                    let currentSign = (brightnessValues[i] >= averageBrightness) ? 1 : -1;
                    if (currentSign !== lastSign) {
                        crossings++;
                        stripeWidths.push(i - lastCrossingIndex); 
                        lastCrossingIndex = i;
                        lastSign = currentSign;
                    }
                }

                let isRegular = false;
                if (stripeWidths.length > 3) {
                    let validWidths = stripeWidths.slice(1, -1); 
                    let minW = Math.min(...validWidths);
                    let maxW = Math.max(...validWidths);
                    if ((maxW - minW) <= 5) {
                        isRegular = true;
                    }
                }

                debugDiv.innerText = `亮度:${Math.round(averageBrightness)} | 對比:${Math.round(contrast)} | 條紋:${crossings} | 規律:${isRegular}`;

                // 【防偽升級】：將對比度 (contrast) 門檻大幅拉高到 85！
                // 電腦螢幕的對比度通常只有 20~40，絕對無法通過這關。
                // 只有 3W 強光 LED 才能製造出 >85 的暴烈黑白對比！
                if (contrast > 85 && averageBrightness > 90 && isRegular) {
                    if (crossings >= 14 && crossings <= 30) {
                        sendData("A");
                    }
                }
            }
        }

        let isSending = false;
        function sendData(roomCode) {
            if (isSending) return; 
            
            const studentId = document.getElementById('studentId').value.trim();
            
            if(!studentId) {
                statusDiv.innerText = "❌ 已對準發射器，但您忘記輸入學號！";
                statusDiv.style.color = "red";
                return;
            }

            // ==========================================
            // 升級：LocalStorage 永久冷卻時間攔截器
            // ==========================================
            const now = Date.now();
            // 從瀏覽器的永久儲存區提取該學號的最後打卡時間
            const storageKey = 'lastCheckIn_' + studentId;
            const lastCheckIn = localStorage.getItem(storageKey);

            if (lastCheckIn) {
                const timePassed = now - parseInt(lastCheckIn);
                if (timePassed < COOLDOWN_MS) {
                    let remainSeconds = Math.ceil((COOLDOWN_MS - timePassed) / 1000);
                    statusDiv.innerText = `⏳ 學號 ${studentId} 請勿狂刷！請等待 ${remainSeconds} 秒。`;
                    statusDiv.style.color = "red";
                    return; // 直接中斷
                }
            }

            isSending = true;
            statusDiv.innerText = "🔒 成功捕捉加密光譜！正在傳送至雲端...";
            statusDiv.style.color = "#007bff";

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=${roomCode}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    // 打卡成功後，將時間寫入瀏覽器永久儲存區
                    localStorage.setItem(storageKey, Date.now());
                    
                    statusDiv.innerText = "🎉 " + result + " (打卡成功)";
                    statusDiv.style.color = "green";
                    setTimeout(() => { isSending = false; }, 3000); 
                })
                .catch(error => {
                    statusDiv.innerText = "網路連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
