<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Fi 摩斯時序密碼打卡系統 (20Hz相容版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; display: block; }
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            transform: translate(-50%, -50%);
            border: 3px dashed #00ff00;
            pointer-events: none;
        }
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 11px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; font-weight:bold; }
        input, select { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 220px; margin-bottom: 10px; }
        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <h2>Li-Fi 摩斯密碼智慧打卡 (20Hz)</h2>
    
    <select id="phoneIdentity">
        <option value="1">我是：手機 1 (解碼密碼 1)</option>
        <option value="2">我是：手機 2 (解碼密碼 2)</option>
        <option value="3">我是：手機 3 (解碼密碼 3)</option>
    </select>
    <br>
    <input type="text" id="studentId" placeholder="請先輸入學號 (例: 112001)" />
    <br><br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
    </div>
    <br>
    
    <button id="startBtn" onclick="startCamera()">開啟 20Hz 密碼掃描</button>
    <div id="status">系統就緒，等待開啟...</div>
    <div id="debug">20Hz 時序分析器就緒...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        
        // 確保這是您的專屬 Google API
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";
        const COOLDOWN_MS = 60000; 

        // 20Hz 時序解碼器核心變數
        let lastState = -1;
        let lastTransitionTime = performance.now();
        let currentSequence = [];
        let isHeaderDetected = false;
        let isWarmingUp = false;

        function startCamera() {
            // 第一層：嘗試呼叫標準環境後鏡頭（移除嚴格的 fps 限制以提高相容性）
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) {
                initCameraStream(stream);
            })
            .catch(function(err) {
                console.log("後鏡頭呼叫失敗，啟用第二層備援...", err);
                // 第二層：如果後鏡頭失敗，改用通用設定呼叫任意可用鏡頭
                navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    initCameraStream(stream);
                })
                .catch(function(err2) {
                    statusDiv.innerText = "❌ 無法開啟相機，請點網址旁鎖頭允許相機權限！";
                    statusDiv.style.color = "red";
                });
            });
        }

        function initCameraStream(stream) {
            video.srcObject = stream;
            isWarmingUp = true;
            statusDiv.innerText = "⏳ 數位濾鏡動態校準中...";
            statusDiv.style.color = "orange";
            
            setTimeout(() => {
                isWarmingUp = false;
                statusDiv.innerText = "請將綠色方框對準 20Hz 閃爍 LED...";
                statusDiv.style.color = "#007bff";
            }, 2000);

            // 保持每 15 毫秒高頻採樣，精準切碎捕捉脈衝
            setInterval(analyzeTemporalPulse, 15); 
        }

        function analyzeTemporalPulse() {
            if (isWarmingUp || isSending) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = 100;
                canvas.height = 100;
                ctx.drawImage(video, video.videoWidth/2 - 50, video.videoHeight/2 - 50, 100, 100, 0, 0, 100, 100);
                
                const imageData = ctx.getImageData(0, 0, 100, 100).data;
                let totalBrightness = 0;
                let maxB = 0;
                let minB = 255;

                for (let i = 0; i < imageData.length; i += 4) {
                    let b = (imageData[i] + imageData[i+1] + imageData[i+2]) / 3;
                    totalBrightness += b;
                    if (b > maxB) maxB = b;
                    if (b < minB) minB = b;
                }
                
                let avgBrightness = totalBrightness / (canvas.width * canvas.height);
                let contrast = maxB - minB;

                if (contrast > 40) { 
                    let midPoint = minB + (contrast / 2);
                    let currentState = avgBrightness > midPoint ? 1 : 0;

                    if (lastState === -1) {
                        lastState = currentState;
                        lastTransitionTime = performance.now();
                        return;
                    }

                    if (currentState !== lastSign) { // 修正為防重複觸發切換
                        let now = performance.now();
                        let duration = now - lastTransitionTime; 
                        
                        decodePulse(lastState, duration);

                        lastState = currentState;
                        lastTransitionTime = now;
                    }
                }
            }
        }

        // 全域變數修正，避免變數名稱衝突
        let lastSign = -1; 

        function decodePulse(state, duration) {
            const targetIdentity = document.getElementById('phoneIdentity').value;
            
            if (state === 1) {
                // 1. 偵測 20Hz 前導標頭 (250ms)，放寬區間增加容錯
                if (duration >= 180 && duration <= 320) {
                    isHeaderDetected = true;
                    currentSequence = []; 
                    debugDiv.innerText = "📡 偵測到 20Hz 封包標頭，解碼中...";
                    return;
                }

                // 2. 收集密碼元素
                if (isHeaderDetected) {
                    // 短亮 (50ms)
                    if (duration >= 25 && duration <= 85) {
                        currentSequence.push("SHORT");
                    } 
                    // 長亮 (150ms)
                    else if (duration >= 100 && duration <= 200) {
                        currentSequence.push("LONG");
                    } 
                    else {
                        isHeaderDetected = false;
                    }
                }
            } else {
                if (duration > 650) {
                    isHeaderDetected = false;
                }
            }

            if (isHeaderDetected && currentSequence.length === 2) {
                let detectedCode = 0;
                
                if (currentSequence[0] === "SHORT" && currentSequence[1] === "LONG") detectedCode = 1;
                if (currentSequence[0] === "LONG" && currentSequence[1] === "SHORT") detectedCode = 2;
                if (currentSequence[0] === "LONG" && currentSequence[1] === "LONG")  detectedCode = 3;

                if (detectedCode > 0) {
                    debugDiv.innerText = `🟢 成功識別 20Hz 訊號：【密碼 ${detectedCode}】`;
                    
                    if (detectedCode == targetIdentity) {
                        sendData(detectedCode);
                    } else {
                        statusDiv.innerText = `⏳ 捕獲密碼 ${detectedCode}，與本機身份(${targetIdentity})不符，等待輪播...`;
                        statusDiv.style.color = "purple";
                    }
                }

                isHeaderDetected = false;
                currentSequence = [];
            }
        }

        let isSending = false;
        function sendData(matchedCode) {
            if (isSending) return;
            const studentId = document.getElementById('studentId').value.trim();
            
            if(!studentId) {
                statusDiv.innerText = `❌ 密碼 ${matchedCode} 驗證成功！但您忘記輸入學號。`;
                statusDiv.style.color = "red";
                return;
            }

            const now = Date.now();
            const storageKey = 'lastCheckIn_' + studentId;
            const lastCheckIn = localStorage.getItem(storageKey);

            if (lastCheckIn) {
                const timePassed = now - parseInt(lastCheckIn);
                if (timePassed < COOLDOWN_MS) {
                    let remainSeconds = Math.ceil((COOLDOWN_MS - timePassed) / 1000);
                    statusDiv.innerText = `⏳ 學號 ${studentId} 請勿狂刷！請等待 ${remainSeconds} 秒。`;
                    statusDiv.style.color = "red";
                    return; 
                }
            }

            isSending = true;
            statusDiv.innerText = `🎉 【密碼 ${matchedCode}】成功解鎖身份！打卡傳送中...`;
            statusDiv.style.color = "green";

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=Phone_${matchedCode}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    localStorage.setItem(storageKey, Date.now());
                    statusDiv.innerText = "🎉 " + result + " (打卡成功)";
                    setTimeout(() => { 
                        isSending = false; 
                        statusDiv.innerText = "請將綠色方框對準 20Hz 閃爍 LED...";
                        statusDiv.style.color = "#007bff";
                    }, 3000); 
                })
                .catch(error => {
                    statusDiv.innerText = "網路連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
