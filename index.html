<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Fi 商業級打卡系統 (波動值防禦版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; display: block; }
        
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 160px;
            transform: translate(-50%, -50%);
            border: 2px solid #00ff00;
            pointer-events: none;
        }
        
        .scan-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 140px;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 0, 0, 0.7);
            pointer-events: none;
        }
        
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 12px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 220px; }
        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <h2>Li-Fi 光學智慧打卡</h2>
    <input type="text" id="studentId" placeholder="請先輸入學號 (例: 112001)" />
    <br><br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
        <div class="scan-line"></div>
    </div>
    <br>
    
    <button id="startBtn" onclick="startCamera()">開啟 Li-Fi 掃描</button>
    <div id="status">系統就緒，等待掃描...</div>
    <div id="debug">條紋特徵與環境分析中...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        
        // 確保這是您的專屬 Google API
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";

        const COOLDOWN_MS = 60000; // 1分鐘防刷冷卻
        let validFrameCount = 0; 

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", frameRate: { ideal: 30, max: 60 } } })
            .then(function(stream) {
                video.srcObject = stream;
                statusDiv.innerText = "請用「紅色掃描線」對準發射器...";
                statusDiv.style.color = "#007bff";
                setInterval(analyzeStripes, 50); 
            })
            .catch(function(err) {
                statusDiv.innerText = "無法啟動相機：" + err;
            });
        }

        function analyzeStripes() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                const startY = centerY - 70;
                const scanHeight = 140;
                const imageData = ctx.getImageData(centerX, startY, 1, scanHeight);
                const data = imageData.data;
                
                let brightnessValues = [];
                let totalBrightness = 0;
                
                for (let i = 0; i < data.length; i += 4) {
                    let brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                    brightnessValues.push(brightness);
                    totalBrightness += brightness;
                }
                
                let averageBrightness = totalBrightness / brightnessValues.length;
                
                // 【終極防禦】：計算總波動值 (Total Variation)
                let totalVariation = 0;
                for (let i = 1; i < brightnessValues.length; i++) {
                    totalVariation += Math.abs(brightnessValues[i] - brightnessValues[i-1]);
                }
                
                let maxB = brightnessValues[0]; 
                let minB = brightnessValues[0];
                for(let b of brightnessValues) {
                    if(b > maxB) maxB = b;
                    if(b < minB) minB = b;
                }
                let contrast = maxB - minB;

                let crossings = 0;
                let lastSign = (brightnessValues[0] >= averageBrightness) ? 1 : -1;
                
                for (let i = 1; i < brightnessValues.length; i++) {
                    let currentSign = (brightnessValues[i] >= averageBrightness) ? 1 : -1;
                    if (currentSign !== lastSign) {
                        crossings++;
                        lastSign = currentSign;
                    }
                }

                // 將數值顯示在除錯畫面上，方便您觀察發射器與電腦螢幕的差異
                debugDiv.innerText = `波動:${Math.round(totalVariation)} | 對比:${Math.round(contrast)} | 條紋:${crossings}`;

                // ==========================================
                // 波動值防禦邏輯 + 連續影格驗證
                // ==========================================
                let isSignalValid = false;

                // 條件一：總波動值 (TV) 必須大於 800 (電腦螢幕通常只有 100~300)
                // 條件二：對比度大於 150
                // 條件三：條紋至少 3 條
                // 條件四：整體亮度大於 80
                if (totalVariation > 800 && contrast > 150 && crossings >= 3 && averageBrightness > 80) {
                    isSignalValid = true;
                }

                if (isSending) return;

                if (isSignalValid) {
                    validFrameCount++;
                    if (validFrameCount < 3) {
                        statusDiv.innerText = `🔍 高頻訊號確認中... (${validFrameCount}/3)`;
                        statusDiv.style.color = "orange";
                    } else {
                        sendData("A");
                        validFrameCount = 0; 
                    }
                } else {
                    validFrameCount = 0; 
                    if (statusDiv.innerText.includes("確認中")) {
                        statusDiv.innerText = "系統就緒，等待掃描...";
                        statusDiv.style.color = "#2c3e50";
                    }
                }
            }
        }

        let isSending = false;
        function sendData(roomCode) {
            const studentId = document.getElementById('studentId').value.trim();
            
            if(!studentId) {
                statusDiv.innerText = "❌ 驗證通過，但您忘記輸入學號！";
                statusDiv.style.color = "red";
                return;
            }

            // ==========================================
            // LocalStorage 一分鐘防刷機制
            // ==========================================
            const now = Date.now();
            const storageKey = 'lastCheckIn_' + studentId;
            const lastCheckIn = localStorage.getItem(storageKey);

            if (lastCheckIn) {
                const timePassed = now - parseInt(lastCheckIn);
                if (timePassed < COOLDOWN_MS) {
                    let remainSeconds = Math.ceil((COOLDOWN_MS - timePassed) / 1000);
                    statusDiv.innerText = `⏳ 學號 ${studentId} 請勿狂刷！請等待 ${remainSeconds} 秒。`;
                    statusDiv.style.color = "red";
                    return; 
                }
            }

            isSending = true;
            statusDiv.innerText = "🔒 防偽驗證通過！正在傳送至雲端...";
            statusDiv.style.color = "#007bff";

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=${roomCode}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    localStorage.setItem(storageKey, Date.now()); // 成功後寫入永久記憶
                    statusDiv.innerText = "🎉 " + result + " (打卡成功)";
                    statusDiv.style.color = "green";
                    setTimeout(() => { 
                        isSending = false; 
                        statusDiv.innerText = "系統就緒，等待掃描...";
                        statusDiv.style.color = "#2c3e50";
                    }, 3000); 
                })
                .catch(error => {
                    statusDiv.innerText = "網路連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
