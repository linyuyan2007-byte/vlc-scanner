<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光學智慧打卡系統</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        
        /* 替影片加上容器，用來定位準星 */
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 2px solid #ccc;
            background: #000;
        }
        
        video { width: 100%; display: block; }
        
        /* 畫面的狙擊準星 */
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 30px;      /* 準星寬度 */
            height: 30px;     /* 準星高度 */
            transform: translate(-50%, -50%);
            border: 2px solid #00ff00; /* 螢光綠色邊框 */
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
            pointer-events: none; /* 避免擋住點擊 */
        }
        
        #status { font-weight: bold; color: blue; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>請輸入學號並對準閃爍燈光</h2>
    <input type="text" id="studentId" placeholder="輸入學號 (例: 112001)" />
    <br><br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
    </div>
    <br>
    
    <button id="startBtn" onclick="startCamera()">啟動相機掃描</button>
    <div id="status">等待操作...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        
        // 請確保這行是您正確的 API 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) {
                video.srcObject = stream;
                statusDiv.innerText = "相機已啟動，請將綠色準星對準光源...";
                setInterval(analyzeLight, 50); 
            })
            .catch(function(err) {
                statusDiv.innerText = "無法存取相機：" + err;
            });
        }

        function analyzeLight() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const imageData = ctx.getImageData(centerX - 5, centerY - 5, 10, 10);
                const data = imageData.data;
                
                let brightness = 0;
                for (let i = 0; i < data.length; i += 4) {
                    brightness += (data[i] + data[i+1] + data[i+2]) / 3; 
                }
                brightness = brightness / (data.length / 4);

                // 亮度門檻設定為 250，避免環境光誤觸
                if (brightness > 250) { 
                    statusDiv.innerText = "偵測到教室訊號 [A]！正在打卡...";
                    sendData("A");
                }
            }
        }

        let isSending = false;
        function sendData(roomCode) {
            if (isSending) return; 
            isSending = true;
            const studentId = document.getElementById('studentId').value;
            
            if(!studentId) {
                alert("請先輸入學號！");
                isSending = false;
                return;
            }

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=${roomCode}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    statusDiv.innerText = result + " (已紀錄至試算表)";
                    statusDiv.style.color = "green";
                })
                .catch(error => {
                    statusDiv.innerText = "網路錯誤，請重試";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
