<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Fi 封包式摩斯密碼系統</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; display: block; }
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            transform: translate(-50%, -50%);
            border: 3px dashed #00ff00;
            pointer-events: none;
        }
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 11px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; font-weight:bold; }
        input, select { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 220px; margin-bottom: 10px; }
        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <h2>Li-Fi 封包式密碼打卡</h2>
    
    <select id="phoneIdentity">
        <option value="1">📱 我是：手機 1 (只收密碼 1)</option>
        <option value="2">📱 我是：手機 2 (只收密碼 2)</option>
        <option value="3">📱 我是：手機 3 (只收密碼 3)</option>
    </select>
    <br>
    <input type="text" id="studentId" placeholder="請先輸入學號 (例: 112001)" />
    <br><br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
    </div>
    <br>
    
    <button id="startBtn" onclick="startCamera()">啟動封包解碼器</button>
    <div id="status">系統就緒，等待開啟...</div>
    <div id="debug">封包狀態機就緒...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        
        // 確保這是您的專屬 Google API
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";
        const COOLDOWN_MS = 60000; 

        // 狀態機核心變數
        let lastState = -1;
        let lastTransitionTime = performance.now();
        let currentSequence = [];
        let isReceivingPacket = false;
        let isWarmingUp = false;

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(function(stream) {
                initCameraStream(stream);
            })
            .catch(function(err) {
                navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) { initCameraStream(stream); })
                .catch(function(err2) {
                    statusDiv.innerText = "❌ 無法開啟相機，請允許相機權限！";
                    statusDiv.style.color = "red";
                });
            });
        }

        function initCameraStream(stream) {
            video.srcObject = stream;
            isWarmingUp = true;
            statusDiv.innerText = "⏳ 鏡頭曝光校準中...";
            statusDiv.style.color = "orange";
            
            setTimeout(() => {
                isWarmingUp = false;
                statusDiv.innerText = "請將綠色方框對準發射器 LED";
                statusDiv.style.color = "#007bff";
            }, 2000);

            // 高頻採樣 (每 15ms 一次)，確保抓到精準時間差
            setInterval(analyzeTemporalPulse, 15); 
        }

        function analyzeTemporalPulse() {
            if (isWarmingUp || isSending) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = 80;
                canvas.height = 80;
                ctx.drawImage(video, video.videoWidth/2 - 40, video.videoHeight/2 - 40, 80, 80, 0, 0, 80, 80);
                
                const imageData = ctx.getImageData(0, 0, 80, 80).data;
                let totalBrightness = 0;
                let maxB = 0, minB = 255;

                for (let i = 0; i < imageData.length; i += 4) {
                    let b = (imageData[i] + imageData[i+1] + imageData[i+2]) / 3;
                    totalBrightness += b;
                    if (b > maxB) maxB = b;
                    if (b < minB) minB = b;
                }
                
                let avgBrightness = totalBrightness / (canvas.width * canvas.height);
                let contrast = maxB - minB;

                // 確保環境對比足夠，濾除無效雜訊
                if (contrast > 40) { 
                    let midPoint = minB + (contrast / 2);
                    let currentState = avgBrightness > midPoint ? 1 : 0;

                    if (lastState === -1) {
                        lastState = currentState;
                        lastTransitionTime = performance.now();
                        return;
                    }

                    if (currentState !== lastState) {
                        let now = performance.now();
                        let duration = now - lastTransitionTime; 
                        
                        decodePulse(lastState, duration);

                        lastState = currentState;
                        lastTransitionTime = now;
                    }
                }
            }
        }

        function decodePulse(state, duration) {
            const targetIdentity = document.getElementById('phoneIdentity').value;
            
            // 我們只測量「亮區 (state=1)」的持續時間，用來判斷訊號種類
            if (state === 1) {
                // 1. 【START 標頭】預期 231ms (容許 190ms ~ 300ms)
                if (duration >= 190 && duration <= 300) {
                    isReceivingPacket = true;
                    currentSequence = []; 
                    debugDiv.innerText = "📥 [START] 封包開始，接收密碼中...";
                    return;
                }

                if (isReceivingPacket) {
                    // 2. 【SHORT 短訊號】預期 33ms (容許 15ms ~ 60ms)
                    if (duration >= 15 && duration <= 60) {
                        currentSequence.push("S");
                    } 
                    // 3. 【LONG 長訊號】預期 99ms (容許 70ms ~ 130ms)
                    else if (duration >= 70 && duration <= 130) {
                        currentSequence.push("L");
                    } 
                    // 4. 【END 結尾】預期 165ms (容許 140ms ~ 185ms)
                    else if (duration >= 140 && duration <= 185) {
                        processPacket(targetIdentity);
                    }
                    else {
                        // 異常雜訊，放棄當前封包
                        isReceivingPacket = false;
                        debugDiv.innerText = `❌ 雜訊干擾 (寬度: ${Math.round(duration)}ms)，丟棄封包`;
                    }
                }
            } else {
                // 若暗的間隔太久(超過 800ms)，重置狀態機
                if (duration > 800) {
                    isReceivingPacket = false;
                }
            }
        }

        function processPacket(targetIdentity) {
            isReceivingPacket = false; // 封包接收完畢
            let detectedCode = 0;
            
            // 將陣列轉為字串方便比對，例如 "S,L"
            let sig = currentSequence.join(","); 

            if (sig === "S,L") detectedCode = 1;
            if (sig === "L,S") detectedCode = 2;
            if (sig === "L,L") detectedCode = 3;

            if (detectedCode > 0) {
                debugDiv.innerText = `✅ [END] 封包解析完成：【密碼 ${detectedCode}】`;
                
                if (detectedCode == targetIdentity) {
                    sendData(detectedCode);
                } else {
                    statusDiv.innerText = `🔄 收到密碼 ${detectedCode}，非本機設定(${targetIdentity})，等待輪播中...`;
                    statusDiv.style.color = "purple";
                }
            } else {
                debugDiv.innerText = `⚠️ 封包破損，無法解析 (${sig})`;
            }
            
            currentSequence = []; // 清空緩衝區
        }

        let isSending = false;
        function sendData(matchedCode) {
            if (isSending) return;
            const studentId = document.getElementById('studentId').value.trim();
            
            if(!studentId) {
                statusDiv.innerText = `❌ 密碼 ${matchedCode} 驗證成功！但您忘記輸入學號。`;
                statusDiv.style.color = "red";
                return;
            }

            // ==========================================
            // 1 分鐘嚴格防刷機制 (基於學號)
            // ==========================================
            const now = Date.now();
            const storageKey = 'lastCheckIn_' + studentId;
            const lastCheckIn = localStorage.getItem(storageKey);

            if (lastCheckIn) {
                const timePassed = now - parseInt(lastCheckIn);
                if (timePassed < COOLDOWN_MS) {
                    let remainSeconds = Math.ceil((COOLDOWN_MS - timePassed) / 1000);
                    statusDiv.innerText = `⏳ 學號 ${studentId} 請勿狂刷！請等待 ${remainSeconds} 秒。`;
                    statusDiv.style.color = "red";
                    return; 
                }
            }

            isSending = true;
            statusDiv.innerText = `🎉 身份驗證通過 (密碼 ${matchedCode})！打卡傳送中...`;
            statusDiv.style.color = "green";

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=Phone_${matchedCode}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    localStorage.setItem(storageKey, Date.now()); // 成功後寫入打卡時間
                    statusDiv.innerText = "🎉 " + result + " (打卡成功)";
                    setTimeout(() => { 
                        isSending = false; 
                        statusDiv.innerText = "請將綠色方框對準發射器 LED";
                        statusDiv.style.color = "#007bff";
                    }, 3000); 
                })
                .catch(error => {
                    statusDiv.innerText = "網路連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
