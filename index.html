<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Li-Fi 商業級打卡系統 (時序防偽版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f3f6; }
        .video-container {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 300px;
            border: 3px solid #2c3e50;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        video { width: 100%; display: block; }
        
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 160px;
            transform: translate(-50%, -50%);
            border: 2px solid #00ff00;
            pointer-events: none;
        }
        
        .scan-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 140px;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 0, 0, 0.7);
            pointer-events: none;
            box-shadow: 0 0 4px red;
        }
        
        #status { font-weight: bold; color: #2c3e50; margin-top: 15px; font-size: 16px; min-height: 48px; }
        #debug { color: #555; font-size: 11px; margin-top: 10px; font-family: monospace; background: #fff; padding: 5px; display: inline-block; border-radius: 4px; font-weight:bold; }
        input { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; width: 220px; }
        button { padding: 12px 24px; font-size: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <h2>Li-Fi 光學智慧打卡</h2>
    <input type="text" id="studentId" placeholder="請先輸入學號 (例: 112001)" />
    <br><br>
    
    <div class="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="target-box"></div>
        <div class="scan-line"></div>
    </div>
    <br>
    
    <button id="startBtn" onclick="startCamera()">開啟 Li-Fi 掃描</button>
    <div id="status">系統就緒，等待掃描...</div>
    <div id="debug">核心演算法分析中...</div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debug');
        
        // 確保這是您的專屬 Google API
        const API_URL = "https://script.google.com/macros/s/AKfycbyBVSH5XNEpiaPWhDoD4AhEURGxxhKSlTbqlpt4gg4CvQkkPC4qLn2WMwqFWkUb9niePw/exec";

        const COOLDOWN_MS = 60000; 
        let validFrameCount = 0; 
        let isWarmingUp = false; 
        
        // 【核心記憶體】：紀錄上一幀的亮度，用來捕捉動態相位漂移
        let prevBrightnessValues = []; 

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", frameRate: { ideal: 30, max: 60 } } })
            .then(function(stream) {
                video.srcObject = stream;
                
                isWarmingUp = true;
                statusDiv.innerText = "⏳ 相機暖機中，請稍候...";
                statusDiv.style.color = "orange";
                
                setTimeout(() => {
                    isWarmingUp = false;
                    statusDiv.innerText = "請用「紅色掃描線」對準發射器...";
                    statusDiv.style.color = "#007bff";
                }, 2000);

                setInterval(analyzeStripes, 50); 
            })
            .catch(function(err) {
                statusDiv.innerText = "無法啟動相機：" + err;
            });
        }

        function analyzeStripes() {
            if (isWarmingUp || isSending) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                const startY = centerY - 70;
                const scanHeight = 140;
                const imageData = ctx.getImageData(centerX, startY, 1, scanHeight);
                const data = imageData.data;
                
                let brightnessValues = [];
                for (let i = 0; i < data.length; i += 4) {
                    brightnessValues.push((data[i] + data[i+1] + data[i+2]) / 3);
                }
                
                let maxB = Math.max(...brightnessValues);
                let minB = Math.min(...brightnessValues);
                let contrast = maxB - minB;
                
                // ==========================================
                // 【核心算法一】：計算時序相位變異（前後兩影格相減）
                // ==========================================
                let flickerPixelCount = 0;
                if (prevBrightnessValues.length === brightnessValues.length) {
                    for (let i = 0; i < brightnessValues.length; i++) {
                        // 如果該像素點在 50 毫秒內，明暗度變化超過 70 單位
                        if (Math.abs(brightnessValues[i] - prevBrightnessValues[i]) > 70) {
                            flickerPixelCount++;
                        }
                    }
                }
                // 更新記憶體，供下一幀比對
                prevBrightnessValues = [...brightnessValues];

                // 計算條紋數量
                let averageBrightness = brightnessValues.reduce((a, b) => a + b, 0) / brightnessValues.length;
                let crossings = 0;
                let lastSign = (brightnessValues[0] >= averageBrightness) ? 1 : -1;
                
                for (let i = 1; i < brightnessValues.length; i++) {
                    let currentSign = (brightnessValues[i] >= averageBrightness) ? 1 : -1;
                    if (currentSign !== lastSign) {
                        crossings++;
                        lastSign = currentSign;
                    }
                }

                // 顯示關鍵數據：新增「動態閃爍像素」
                debugDiv.innerText = `最亮:${Math.round(maxB)} | 對比:${Math.round(contrast)} | 條紋:${crossings} | 閃爍像素:${flickerPixelCount}`;

                // ==========================================
                // 【終極防線】：時空雙重指紋驗證
                // ==========================================
                let isSignalValid = false;

                // 條件一：必須具有基礎條紋對比度 (>120)
                // 條件二：條紋數必須符合高頻光柵特徵 (2 到 12 條)
                // 條件三：【絕殺條件】閃爍像素必須在 15 到 80 之間！
                // -> 如果照到沒通電的板子或字體，閃爍像素通常 < 5，直接封殺。
                // -> 如果快速晃動手機洗畫面，閃爍像素會飆破 100，一樣封殺！
                if (contrast > 120 && crossings >= 2 && crossings <= 12 && flickerPixelCount >= 15 && flickerPixelCount <= 80) {
                    isSignalValid = true;
                }

                if (isSignalValid) {
                    validFrameCount++;
                    if (validFrameCount < 3) {
                        statusDiv.innerText = `🔍 驗證高頻相位動態中... (${validFrameCount}/3)`;
                        statusDiv.style.color = "orange";
                    } else {
                        sendData("A");
                        validFrameCount = 0; 
                    }
                } else {
                    validFrameCount = 0; 
                    if (statusDiv.innerText.includes("驗證高頻")) {
                        statusDiv.innerText = "請用「紅色掃描線」對準發射器...";
                        statusDiv.style.color = "#007bff";
                    }
                }
            }
        }

        let isSending = false;
        function sendData(roomCode) {
            const studentId = document.getElementById('studentId').value.trim();
            
            if(!studentId) {
                statusDiv.innerText = "❌ 驗證通過，但您忘記輸入學號！";
                statusDiv.style.color = "red";
                return;
            }

            const now = Date.now();
            const storageKey = 'lastCheckIn_' + studentId;
            const lastCheckIn = localStorage.getItem(storageKey);

            if (lastCheckIn) {
                const timePassed = now - parseInt(lastCheckIn);
                if (timePassed < COOLDOWN_MS) {
                    let remainSeconds = Math.ceil((COOLDOWN_MS - timePassed) / 1000);
                    statusDiv.innerText = `⏳ 學號 ${studentId} 請勿狂刷！請等待 ${remainSeconds} 秒。`;
                    statusDiv.style.color = "red";
                    return; 
                }
            }

            isSending = true;
            statusDiv.innerText = "🔒 動態解碼成功！打卡傳送中...";
            statusDiv.style.color = "#007bff";

            const fetchUrl = `${API_URL}?student_id=${studentId}&room=${roomCode}`;
            
            fetch(fetchUrl)
                .then(response => response.text())
                .then(result => {
                    localStorage.setItem(storageKey, Date.now());
                    statusDiv.innerText = "🎉 " + result + " (打卡成功)";
                    statusDiv.style.color = "green";
                    setTimeout(() => { 
                        isSending = false; 
                        statusDiv.innerText = "請用「紅色掃描線」對準發射器...";
                        statusDiv.style.color = "#007bff";
                    }, 3000); 
                })
                .catch(error => {
                    statusDiv.innerText = "網路連線失敗，請檢查網路";
                    isSending = false;
                });
        }
    </script>
</body>
</html>
